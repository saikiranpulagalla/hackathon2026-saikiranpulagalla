version: '3.8'

services:
  agent:
    build: .
    command: python -m src.main
    env_file:
      - .env
    volumes:
      - ./audit_log.json:/app/audit_log.json
      - ./dlq.json:/app/dlq.json
    environment:
      - PYTHONUNBUFFERED=1

  dashboard:
    build: .
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./audit_log.json:/app/audit_log.json
      - ./dlq.json:/app/dlq.json
    environment:
      - PYTHONUNBUFFERED=1
